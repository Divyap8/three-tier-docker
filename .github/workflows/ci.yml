name: CI — Build & Health Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Copy env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build --no-cache

      - name: Start stack
        run: docker compose up -d

      - name: Wait for MySQL healthy
        run: |
          echo "Waiting for MySQL..."
          timeout 180 bash -c '
            until docker inspect --format "{{.State.Health.Status}}" mysql_db 2>/dev/null | grep -q "healthy"; do
              echo "  mysql not ready yet..."; sleep 5
            done
          '
          echo "MySQL healthy ✔"

      - name: Wait for PHP healthy
        run: |
          echo "Waiting for PHP-FPM..."
          timeout 120 bash -c '
            until docker inspect --format "{{.State.Health.Status}}" php_app 2>/dev/null | grep -q "healthy"; do
              echo "  php not ready yet..."; sleep 5
            done
          '
          echo "PHP healthy ✔"

      - name: Wait for Nginx healthy
        run: |
          echo "Waiting for Nginx..."
          timeout 120 bash -c '
            until docker inspect --format "{{.State.Health.Status}}" nginx_web 2>/dev/null | grep -q "healthy"; do
              echo "  nginx not ready yet..."; sleep 5
            done
          '
          echo "Nginx healthy ✔"

      - name: HTTP health check (with retry)
        run: |
          echo "Checking /health endpoint..."
          for i in {1..10}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
            echo "  Attempt $i — HTTP status: $RESPONSE"
            if [ "$RESPONSE" = "200" ]; then
              echo "Health endpoint OK ✔"
              exit 0
            fi
            sleep 5
          done
          echo "Health endpoint failed after 10 attempts ✘"
          exit 1

      - name: API endpoint check (with retry)
        run: |
          echo "Checking /users endpoint..."
          for i in {1..10}; do
            RESPONSE=$(curl -s http://localhost/users)
            echo "  Attempt $i — Response: $RESPONSE"
            if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'users' in d" 2>/dev/null; then
              echo "Users API OK ✔"
              exit 0
            fi
            sleep 5
          done
          echo "Users API failed after 10 attempts ✘"
          exit 1

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
