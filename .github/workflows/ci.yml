name: CI — Build & Health Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build --no-cache

      - name: Start stack
        run: docker compose up -d

      - name: Wait for healthy containers
        run: |
          echo "Waiting for services..."
          timeout 120 bash -c '
            until docker inspect --format "{{.State.Health.Status}}" mysql_db 2>/dev/null | grep -q "healthy"; do sleep 3; done
            until docker inspect --format "{{.State.Health.Status}}" php_app  2>/dev/null | grep -q "healthy"; do sleep 3; done
            until docker inspect --format "{{.State.Health.Status}}" nginx_web 2>/dev/null | grep -q "healthy"; do sleep 3; done
          '
          echo "All containers healthy ✔"

      - name: HTTP health check
        run: |
          curl -sf http://localhost/health | grep -q "ok"
          echo "Health endpoint OK ✔"

      - name: API endpoint check
        run: |
          curl -sf http://localhost/users | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'users' in d"
          echo "Users API OK ✔"

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
