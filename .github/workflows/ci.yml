name: build-and-test

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t three-tier-app .

      - name: Run container
        run: |
          docker run -d -p 3000:3000 --name app-container three-tier-app

      - name: Wait for app to start
        run: sleep 10

      - name: Debug (optional)
        run: |
          docker ps
          curl -v http://localhost:3000/health || true

      - name: Health Check
        run: |
          curl -sf http://localhost:3000/health | grep -q "ok"
          echo "Health endpoint OK ✔"
