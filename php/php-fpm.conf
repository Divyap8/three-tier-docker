; ─── PHP-FPM Worker Pool (www) ───────────────────────────────────────────────
[www]

user  = appuser
group = appgroup

; Listen on TCP (required for Docker cross-container communication)
listen = 0.0.0.0:9000

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Slow log
slowlog              = /var/log/php/php-fpm-slow.log
request_slowlog_timeout = 5s

; Status endpoint (used by healthcheck)
pm.status_path       = /fpm-status

; Pass environment variables through to PHP
clear_env            = no

; Logging
catch_workers_output = yes
php_flag[display_errors]   = off
php_admin_value[error_log] = /var/log/php/fpm-error.log
php_admin_flag[log_errors] = on
