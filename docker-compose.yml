version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Three-Tier Architecture: Nginx → PHP-FPM → MySQL
#  Private network segmentation: frontend / backend / database
# ─────────────────────────────────────────────────────────────

networks:
  frontend_net:
    driver: bridge
    name: frontend_net
  backend_net:
    driver: bridge
    name: backend_net
  db_net:
    driver: bridge
    name: db_net

volumes:
  mysql_data:
    driver: local
  php_logs:
    driver: local

services:

  # ── TIER 1: Web Server (Nginx) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./php/src:/var/www/html:ro
    networks:
      - frontend_net
      - backend_net
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── TIER 2: Application Server (PHP-FPM) ─────────────────────
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.2"
    image: app-php:8.2
    container_name: php_app
    restart: unless-stopped
    volumes:
      - ./php/src:/var/www/html:rw
      - php_logs:/var/log/php
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      APP_ENV: ${APP_ENV:-production}
    networks:
      - backend_net
      - db_net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'configuration file .* test is successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── TIER 3: Database (MySQL) ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-appdb}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - db_net
    expose:
      - "3306"        # NOT published to host — private network only
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
